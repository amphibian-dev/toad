name: Test on Windows

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
        experimental: [false]
        include:
          - python-version: '3.13'
            experimental: true
      fail-fast: false
    runs-on: windows-latest
    continue-on-error: ${{ matrix.experimental }}
    name: Test py ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@master
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - run: make build_deps
      - run: make build
      - run: ls -la target/wheels/
      - run: pip install -r requirements-nn.txt
      - run: pip install .[all]
      - run: python -c "import toad.toad; print('Rust module imported successfully')"
      - run: python -c "from toad.merge import _chi_merge_rust; print('_chi_merge_rust:', _chi_merge_rust)"
      - run: make test
      - run: make dist_wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python-version }}
          path: dist/*.whl
  release:
    needs: [test]
    # release when using `tags` or `release` branch
    if: ${{ startsWith(github.ref, 'refs/tags') || github.ref == 'refs/heads/release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        name: publish pypi
        with:
          user: __token__
          password: ${{ secrets.PYPI }}
